<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark background -->
    <rect id="bg" width="512" height="512" rx="100" fill="#1a0e05"/>

    <!-- Wood horizontal gradient for side posts -->
    <linearGradient id="wood-post" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4a2a10"/>
      <stop offset="30%"  stop-color="#8B5E3C"/>
      <stop offset="55%"  stop-color="#C4874A"/>
      <stop offset="80%"  stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#4a2a10"/>
    </linearGradient>

    <!-- Wood cap gradient (top-to-bottom) -->
    <linearGradient id="wood-cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#DEB887"/>
      <stop offset="35%"  stop-color="#C4874A"/>
      <stop offset="100%" stop-color="#5a3018"/>
    </linearGradient>

    <!-- Glass tint -->
    <linearGradient id="glass-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#C8D0E8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C8D0E8" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="glass-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#C8D0E8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#C8D0E8" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Sand gradient -->
    <linearGradient id="sand-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F4D03F"/>
      <stop offset="60%"  stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>

    <!-- Sand highlight shimmer -->
    <linearGradient id="sand-shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFE680" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#FFE680" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFE680" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip path for bottom chamber sand -->
    <clipPath id="bottom-clip">
      <path d="M 210 268 Q 148 330 108 420 L 404 420 Q 364 330 302 268 Z"/>
    </clipPath>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="100" fill="#1a0e05"/>

  <!-- ═══════════════════════════════ -->
  <!--  LEFT wooden post              -->
  <!-- ═══════════════════════════════ -->
  <rect x="88" y="56" width="48" height="400" rx="12" fill="url(#wood-post)"/>
  <!-- post grain lines -->
  <line x1="96"  y1="70"  x2="92"  y2="440" stroke="#DEB887" stroke-width="1.2" opacity="0.25"/>
  <line x1="108" y1="70"  x2="106" y2="440" stroke="#6B4226" stroke-width="0.8" opacity="0.3"/>
  <line x1="122" y1="70"  x2="120" y2="440" stroke="#DEB887" stroke-width="1"   opacity="0.2"/>

  <!-- ═══════════════════════════════ -->
  <!--  RIGHT wooden post             -->
  <!-- ═══════════════════════════════ -->
  <rect x="376" y="56" width="48" height="400" rx="12" fill="url(#wood-post)"/>
  <!-- post grain lines -->
  <line x1="384" y1="70"  x2="382" y2="440" stroke="#DEB887" stroke-width="1.2" opacity="0.25"/>
  <line x1="398" y1="70"  x2="396" y2="440" stroke="#6B4226" stroke-width="0.8" opacity="0.3"/>
  <line x1="414" y1="70"  x2="412" y2="440" stroke="#DEB887" stroke-width="1"   opacity="0.2"/>

  <!-- ═══════════════════════════════ -->
  <!--  TOP cap                       -->
  <!-- ═══════════════════════════════ -->
  <rect x="68" y="46" width="376" height="68" rx="18" fill="url(#wood-cap)"/>
  <!-- cap grain -->
  <line x1="120" y1="52"  x2="110" y2="108" stroke="#8B5E3C" stroke-width="1.5" opacity="0.35"/>
  <line x1="170" y1="52"  x2="162" y2="108" stroke="#DEB887" stroke-width="1"   opacity="0.25"/>
  <line x1="220" y1="52"  x2="216" y2="108" stroke="#8B5E3C" stroke-width="1.2" opacity="0.3"/>
  <line x1="280" y1="52"  x2="278" y2="108" stroke="#DEB887" stroke-width="1"   opacity="0.25"/>
  <line x1="340" y1="52"  x2="337" y2="108" stroke="#8B5E3C" stroke-width="1.2" opacity="0.3"/>
  <line x1="390" y1="52"  x2="386" y2="108" stroke="#DEB887" stroke-width="1"   opacity="0.25"/>
  <!-- cap highlight -->
  <rect x="68" y="46" width="376" height="14" rx="18" fill="white" opacity="0.08"/>

  <!-- Philippine sun on top cap (8-ray) -->
  <g transform="translate(256, 80)" fill="#D4A017" opacity="0.75">
    <circle r="10"/>
    <!-- 8 rays alternating short/long -->
    <rect x="-3" y="-28" width="6" height="14" rx="3"/>
    <rect x="-3" y="14"  width="6" height="14" rx="3"/>
    <rect x="-28" y="-3" width="14" height="6" rx="3"/>
    <rect x="14"  y="-3" width="14" height="6" rx="3"/>
    <!-- diagonal rays -->
    <rect x="-3" y="-3" width="6" height="14" rx="3" transform="rotate(45)  translate(0,-18)"/>
    <rect x="-3" y="-3" width="6" height="14" rx="3" transform="rotate(135) translate(0,-18)"/>
    <rect x="-3" y="-3" width="6" height="14" rx="3" transform="rotate(225) translate(0,-18)"/>
    <rect x="-3" y="-3" width="6" height="14" rx="3" transform="rotate(315) translate(0,-18)"/>
  </g>

  <!-- ═══════════════════════════════ -->
  <!--  BOTTOM cap                    -->
  <!-- ═══════════════════════════════ -->
  <rect x="68" y="398" width="376" height="68" rx="18" fill="url(#wood-cap)"/>
  <!-- cap grain -->
  <line x1="120" y1="404" x2="110" y2="460" stroke="#8B5E3C" stroke-width="1.5" opacity="0.35"/>
  <line x1="170" y1="404" x2="162" y2="460" stroke="#DEB887" stroke-width="1"   opacity="0.25"/>
  <line x1="220" y1="404" x2="216" y2="460" stroke="#8B5E3C" stroke-width="1.2" opacity="0.3"/>
  <line x1="280" y1="404" x2="278" y2="460" stroke="#DEB887" stroke-width="1"   opacity="0.25"/>
  <line x1="340" y1="404" x2="337" y2="460" stroke="#8B5E3C" stroke-width="1.2" opacity="0.3"/>
  <line x1="390" y1="404" x2="386" y2="460" stroke="#DEB887" stroke-width="1"   opacity="0.25"/>
  <!-- cap highlight -->
  <rect x="68" y="398" width="376" height="14" rx="18" fill="white" opacity="0.08"/>

  <!-- ═══════════════════════════════ -->
  <!--  TOP glass chamber             -->
  <!--  Widens from neck (256,258)    -->
  <!--  to top opening (136,114)      -->
  <!-- ═══════════════════════════════ -->
  <path d="M 210 258 Q 148 186 136 114 L 376 114 Q 364 186 302 258 Z"
        fill="#0D1A2A" opacity="0.7"/>
  <!-- glass sheen left -->
  <path d="M 210 258 Q 148 186 136 114 L 176 114 Q 162 180 224 255 Z"
        fill="url(#glass-left)"/>
  <!-- glass sheen right -->
  <path d="M 302 258 Q 364 186 376 114 L 336 114 Q 350 180 288 255 Z"
        fill="url(#glass-right)"/>

  <!-- ═══════════════════════════════ -->
  <!--  BOTTOM glass chamber          -->
  <!--  Widens from neck (256,268)    -->
  <!--  to bottom opening (136,398)   -->
  <!-- ═══════════════════════════════ -->
  <path d="M 210 268 Q 148 330 108 420 L 404 420 Q 364 330 302 268 Z"
        fill="#0D1A2A" opacity="0.7"/>
  <!-- glass sheen left -->
  <path d="M 210 268 Q 148 330 108 420 L 148 420 Q 162 334 224 271 Z"
        fill="url(#glass-left)"/>
  <!-- glass sheen right -->
  <path d="M 302 268 Q 364 330 404 420 L 364 420 Q 350 334 288 271 Z"
        fill="url(#glass-right)"/>

  <!-- Sand fill in bottom chamber (~65% full) -->
  <path d="M 210 268 Q 148 330 108 420 L 404 420 Q 364 330 302 268 Z"
        fill="url(#sand-fill)" clip-path="url(#bottom-clip)"/>
  <!-- Sand surface highlight -->
  <path d="M 256 310 Q 200 318 162 360 Q 210 346 256 342 Q 302 346 350 360 Q 312 318 256 310 Z"
        fill="url(#sand-shine)" opacity="0.6"/>

  <!-- Neck region (glass between chambers) -->
  <rect x="210" y="258" width="92" height="10" rx="4" fill="#0D1A2A" opacity="0.8"/>

  <!-- Falling sand stream through neck -->
  <line x1="256" y1="258" x2="256" y2="268" stroke="#F4D03F" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <!-- Sand drip particles -->
  <circle cx="256" cy="272" r="2.5" fill="#D4A017" opacity="0.7"/>
  <circle cx="254" cy="280" r="1.8" fill="#D4A017" opacity="0.5"/>
  <circle cx="258" cy="288" r="1.4" fill="#D4A017" opacity="0.3"/>
</svg>
